# Netlify подхватывает Next.js автоматически через адаптер OpenNext,
# поэтому команду сборки и каталог публикации указывать не нужно.
# Фиксируем только версию Node: Next 16 требует 20+, а дефолт Netlify
# со временем меняется — явное значение избавляет от сюрпризов при пересборке.

[build.environment]
  NODE_VERSION = "22"
